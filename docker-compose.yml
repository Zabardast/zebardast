services:

  postgres:
    image: postgres:16
    container_name: zebardast-postgres

    restart: always

    environment:
      POSTGRES_DB: zebardast
      POSTGRES_USER: zebardast
      POSTGRES_PASSWORD: zebardast123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zebardast-redis

    restart: always

    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: zebardast-mailpit

    restart: always

    ports:
      - "8025:8025"
      - "1025:1025"

  minio:
    image: minio/minio
    container_name: zebardast-minio

    command: server /data --console-address ":9001"

    restart: always

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: zebardast123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:

  postgres_data:

  minio_data: